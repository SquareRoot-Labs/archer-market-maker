# =============================================================================
# Archer Market Maker — Default Configuration
# =============================================================================
#
# A simple market maker for the Archer Exchange on Solana.
# Streams live prices via WebSocket and places bid/ask levels around mid.
#
# Replace market_pubkey, maker_keypair_path, and rpc_url before running.
# =============================================================================

[market]
# SOL USDC market
market_pubkey = "4G1A6nhCq3QdHMoVVtJ3PZmAHR4temsvXrWgb9yxX7ZN"
maker_keypair_path = "~/.config/solana/id.json"

[connection]
rpc_url = "https://api.mainnet-beta.solana.com"

[feed]
# Binance symbol — must match your market's pair.
# Examples: "SOLUSDT", "ETHUSDT", "BTCUSDT"
binance_symbol = "SOLUSDT"

# Optional cross symbol for synthetic pricing. When set, the derived price
# is primary / cross_mid. Useful for pairs like ETHBTC where you subscribe
# to both ETHUSDT and BTCUSDT and divide. Leave empty for direct pricing.
# cross_symbol = "USDCUSDT"

# binance_ws_url = "wss://stream.binance.com:9443/ws"

# If no price update for this long, pull all quotes.
staleness_timeout_ms = 5000

[strategy]
# Spread levels in basis points (1 bps = 0.01%).
# Each value places one bid and one ask at that distance from mid.
spread_levels_bps = [2.0, 5.0, 7.0, 10.0, 12.0, 15.0, 20.0, 25.0]

# What % of total deposited inventory to quote across all levels.
# Each level gets an equal share: inventory_pct / num_levels.
# 80% means 20% kept as reserve.
inventory_pct = 80.0

# Volatility-adjusted spread widening.
# Tracks realized vol (std dev of log returns) over the last N price samples.
vol_window = 300

# Baseline vol in bps per sample. When realized vol equals this, spreads are
# unchanged. Above it, all spread levels are scaled up proportionally.
vol_baseline_bps = 5.0

# Cap on how much volatility can widen spreads (e.g. 5.0 = max 5x base spreads).
vol_max_multiplier = 5.0

[execution]
# How often the engine loop runs (milliseconds).
# 200ms = 5 updates per second.
loop_interval_ms = 200

# Solana priority fee in microlamports per compute unit.
priority_fee_microlamports = 100

# Shadow mode: compute quotes but don't send transactions.
shadow_mode = false

[monitoring]
log_level = "info"
